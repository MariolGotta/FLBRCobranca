{% extends 'base.html' %}
{% block title %}Alterar Senha{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card bg-dark border-secondary">
            <div class="card-header border-secondary">
                <h5 class="mb-0"><i class="bi bi-key text-warning"></i> Alterar Senha</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-secondary">Senha Atual</label>
                        <input type="password" name="current_password" class="form-control bg-dark border-secondary text-white" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">Nova Senha</label>
                        <input type="password" name="new_password" class="form-control bg-dark border-secondary text-white" required minlength="8">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary">Confirmar Nova Senha</label>
                        <input type="password" name="confirm_password" class="form-control bg-dark border-secondary text-white" required minlength="8">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">Salvar</button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
