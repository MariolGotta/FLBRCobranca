<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FLBR Corp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark">
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card bg-dark border-secondary" style="min-width: 360px; max-width: 420px; width: 100%;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-fill-check text-warning" style="font-size: 3rem;"></i>
                <h2 class="text-warning fw-bold mt-2">FLBR Corp</h2>
                <p class="text-secondary small">Sistema de Cobrança</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary">Nome do Personagem</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary">
                            <i class="bi bi-person text-warning"></i>
                        </span>
                        <input type="text" name="name" class="form-control bg-dark border-secondary text-white"
                               placeholder="Seu nome no EVE" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary">
                            <i class="bi bi-lock text-warning"></i>
                        </span>
                        <input type="password" name="password" class="form-control bg-dark border-secondary text-white"
                               placeholder="Senha" required>
                    </div>
                    <div class="form-text text-secondary mt-1">
                        <i class="bi bi-info-circle"></i> Senha inicial = nome do personagem
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
