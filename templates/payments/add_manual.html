{% extends 'base.html' %}
{% block title %}Cobrança Manual{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card bg-dark border-secondary">
            <div class="card-header border-secondary">
                <h5 class="mb-0"><i class="bi bi-plus-circle text-info"></i> Adicionar Cobrança Manual</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-secondary">Jogador</label>
                            <select name="player_id" class="form-select bg-dark border-secondary text-white" required>
                                <option value="">— Selecione —</option>
                                {% for player in players %}
                                <option value="{{ player.id }}">{{ player.name }} ({{ player.category }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary">Tipo</label>
                            <select name="debt_type" class="form-select bg-dark border-secondary text-white" required>
                                {% for key, label in debt_types %}
                                <option value="{{ key }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-secondary">Valor (m ISK)</label>
                            <input type="number" name="amount" class="form-control bg-dark border-secondary text-white"
                                   min="0" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-secondary">Mês (YYYY-MM)</label>
                            <input type="month" name="month" class="form-control bg-dark border-secondary text-white">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="form-check pb-2">
                                <input class="form-check-input" type="checkbox" name="paid" id="paidCheck">
                                <label class="form-check-label text-secondary" for="paidCheck">Já está pago</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-secondary">Descrição</label>
                            <input type="text" name="description" class="form-control bg-dark border-secondary text-white"
                                   placeholder="Motivo da cobrança" required>
                        </div>
                    </div>
                    <hr class="border-secondary">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-info">
                            <i class="bi bi-plus"></i> Adicionar
                        </button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
